<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, sans-serif; }

#player { width: 100vw; height: 100vh; position: relative; }

.slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.7s ease; pointer-events: none; display: flex; align-items: center; justify-content: center; background: #000; }
.slide.active { opacity: 1; }
.slide video { width: 100%; height: 100%; object-fit: contain; }
.slide img { width: 100%; height: 100%; object-fit: contain; }
.slide iframe { width: 100%; height: 100%; border: none; }

/* Progress */
#progress { position: fixed; bottom: 0; left: 0; height: 3px; background: #7c6af7; z-index: 50; width: 0; }

/* Status screen */
#status { position: fixed; inset: 0; background: #0f0f13; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
#status.hidden { display: none; }
#st-icon { font-size: 52px; margin-bottom: 18px; }
#st-msg { font-size: 16px; color: #8884a8; text-align: center; max-width: 400px; line-height: 1.6; }
#st-sub { font-size: 12px; color: #444; margin-top: 10px; font-family: monospace; text-align: center; }
.spinner { width: 36px; height: 36px; border: 3px solid rgba(124,106,247,0.2); border-top-color: #7c6af7; border-radius: 50%; animation: sp 0.8s linear infinite; margin-bottom: 20px; }
@keyframes sp { to { transform: rotate(360deg); } }

/* Corner badge */
#badge { position: fixed; bottom: 12px; right: 16px; background: rgba(0,0,0,0.55); color: rgba(255,255,255,0.7); font-size: 11px; padding: 4px 10px; border-radius: 6px; z-index: 60; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
body:hover #badge { opacity: 1; }

/* Retry button */
#retry-btn { margin-top: 20px; padding: 8px 20px; background: #7c6af7; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; display: none; }
#retry-btn:hover { background: #9585ff; }
</style>
</head>
<body>

<div id="status">
  <div class="spinner" id="st-spinner"></div>
  <div id="st-icon" style="display:none"></div>
  <div id="st-msg">Veri yükleniyor…</div>
  <div id="st-sub"></div>
  <button id="retry-btn" onclick="init()">Tekrar Dene</button>
</div>

<div id="player"></div>
<div id="progress"></div>
<div id="badge"></div>

<script>
// ── URL parametreleri ─────────────────────────────────
const params = new URLSearchParams(location.search);
const SCREEN_ID = params.get('screen');
// API URL burada sabit — TV'ye sadece ?screen=scr_XXX yazmak yeterli
const HARDCODED_API = 'https://script.google.com/macros/s/AKfycbyoH6VpT9ZaJli0xcLY9fPQrEuFUFE2TNmS9cmekSOrRB0Nwf71Iy5VcLrA10wZA5wQsw/exec';
const API = params.get('api') || HARDCODED_API;

// ── Durum ekranı ─────────────────────────────────────
function showStatus(icon, msg, sub, showRetry) {
  document.getElementById('st-spinner').style.display = 'none';
  document.getElementById('st-icon').style.display = 'block';
  document.getElementById('st-icon').textContent = icon;
  document.getElementById('st-msg').textContent = msg;
  document.getElementById('st-sub').textContent = sub || '';
  document.getElementById('retry-btn').style.display = showRetry ? 'inline-block' : 'none';
  document.getElementById('status').classList.remove('hidden');
}
function hideStatus() { document.getElementById('status').classList.add('hidden'); }

// ── API ───────────────────────────────────────────────
async function fetchPlayerData() {
  if (!API) throw new Error('API URL eksik — admin panelinden URL\'i kopyalayın');
  if (!SCREEN_ID) throw new Error('URL\'de ?screen=ID parametresi eksik');
  const url = `${API}?action=getPlayerData&screenId=${encodeURIComponent(SCREEN_ID)}`;
  const r = await fetch(url);
  const json = await r.json();
  if (!json.ok) throw new Error(json.error || 'Sunucu hatası');
  return json.data; // { screen, items }
}

// ── Tip tespiti ───────────────────────────────────────
function detectType(url, hint) {
  if (hint && hint !== 'iframe') return hint;
  const clean = (url || '').split('?')[0].toLowerCase();
  if (/\.(mp4|webm|ogg|mov)$/.test(clean)) return 'video';
  if (/\.(jpg|jpeg|png|gif|webp|bmp|svg)$/.test(clean)) return 'image';
  return 'video'; // SharePoint linkleri için video varsayımı
}

// ── Oynatıcı durumu ───────────────────────────────────
let items = [], slideEls = [], currentIdx = 0;
let nextTimer = null, dataHash = '';

// ── Slide oluştur ─────────────────────────────────────
function buildSlides(newItems) {
  const player = document.getElementById('player');
  player.innerHTML = '';
  slideEls = [];
  items = newItems;

  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'slide';
    const type = detectType(item.url, item.type);

    if (type === 'video') {
      const v = document.createElement('video');
      v.src = item.url;
      v.muted = true;
      v.playsInline = true;
      v.autoplay = false;
      v.setAttribute('playsinline', '');
      div.appendChild(v);
    } else if (type === 'image') {
      const img = document.createElement('img');
      img.src = item.url;
      img.alt = '';
      div.appendChild(img);
    } else {
      const f = document.createElement('iframe');
      f.src = item.url;
      f.sandbox = 'allow-scripts allow-same-origin';
      div.appendChild(f);
    }

    player.appendChild(div);
    slideEls.push(div);
  });
}

// ── Slide göster ──────────────────────────────────────
function showSlide(idx) {
  clearTimeout(nextTimer);

  slideEls.forEach(s => {
    s.classList.remove('active');
    const v = s.querySelector('video');
    if (v) { v.pause(); v.currentTime = 0; }
  });

  currentIdx = ((idx % items.length) + items.length) % items.length;
  const slide = slideEls[currentIdx];
  const item  = items[currentIdx];
  slide.classList.add('active');

  document.getElementById('badge').textContent = `${currentIdx + 1} / ${items.length}`;

  const type = detectType(item.url, item.type);
  const vid  = slide.querySelector('video');
  const dur  = (Number(item.duration) || 10) * 1000;

  if (type === 'video' && vid) {
    vid.play().catch(() => {
      // Autoplay engellendiyse fallback
      nextTimer = setTimeout(() => showSlide(currentIdx + 1), dur);
    });
    vid.onended = () => showSlide(currentIdx + 1);
    vid.onloadedmetadata = () => animateProgress(vid.duration * 1000);
    vid.onerror = () => {
      console.warn('Video yüklenemedi:', item.url);
      nextTimer = setTimeout(() => showSlide(currentIdx + 1), 3000);
    };
  } else {
    animateProgress(dur);
    nextTimer = setTimeout(() => showSlide(currentIdx + 1), dur);
  }

  hideStatus();
}

// ── Progress bar ─────────────────────────────────────
function animateProgress(ms) {
  const bar = document.getElementById('progress');
  bar.style.transition = 'none';
  bar.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    bar.style.transition = `width ${ms}ms linear`;
    bar.style.width = '100%';
  }));
}

// ── Güncelleme kontrolü ───────────────────────────────
async function checkUpdates() {
  try {
    const data = await fetchPlayerData();
    const newHash = JSON.stringify(data.items.map(i => i.url + i.duration));
    if (newHash !== dataHash) {
      dataHash = newHash;
      buildSlides(data.items);
      showSlide(0);
    }
  } catch (e) {
    console.warn('Güncelleme kontrolü başarısız:', e.message);
  }
}

// ── İlk yükleme ───────────────────────────────────────
async function init() {
  document.getElementById('st-spinner').style.display = 'block';
  document.getElementById('st-icon').style.display = 'none';
  document.getElementById('st-msg').textContent = 'Bağlanıyor…';
  document.getElementById('st-sub').textContent = '';
  document.getElementById('retry-btn').style.display = 'none';
  document.getElementById('status').classList.remove('hidden');

  try {
    const data = await fetchPlayerData();
    if (!data.items || !data.items.length) throw new Error('Playlist boş — admin panelinden içerik ekleyin');
    dataHash = JSON.stringify(data.items.map(i => i.url + i.duration));
    buildSlides(data.items);
    showSlide(0);
    // Her 30 sn güncelleme kontrolü
    setInterval(checkUpdates, 30000);
  } catch (e) {
    showStatus('⚠️', e.message, SCREEN_ID ? `Ekran: ${SCREEN_ID}` : 'screen parametresi yok', true);
  }
}

// ── Klavye kısayolları ────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === 'Enter') showSlide(currentIdx + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'PageUp')  showSlide(currentIdx - 1);
  if (e.key === 'f' || e.key === 'F') document.documentElement.requestFullscreen?.();
  if (e.key === 'r' || e.key === 'R') { clearTimeout(nextTimer); init(); }
});

init();
</script>
</body>
</html>
