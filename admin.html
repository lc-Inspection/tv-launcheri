<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspection TV - Yönetim Paneli</title>
<style>
  body {
    font-family: -apple-system, Arial, sans-serif;
    background: #f4f5f7;
    margin: 0;
    padding: 40px 20px;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  h1 {
    font-size: 22px;
    margin: 0 0 8px 0;
    color: #111;
  }
  p.desc {
    color: #666;
    font-size: 14px;
    margin: 0 0 28px 0;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #333;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    box-sizing: border-box;
    padding: 12px 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    margin-bottom: 20px;
  }
  input:focus {
    outline: none;
    border-color: #4f46e5;
  }
  button {
    width: 100%;
    padding: 13px;
    background: #4f46e5;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover {
    background: #4338ca;
  }
  button:disabled {
    background: #aaa;
    cursor: not-allowed;
  }
  #sonuc {
    margin-top: 18px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }
  #sonuc.basarili {
    background: #ecfdf5;
    color: #047857;
    display: block;
  }
  #sonuc.hatali {
    background: #fef2f2;
    color: #b91c1c;
    display: block;
  }
</style>
</head>
<body>

<div class="container">
  <h1>📺 Ekran Yönetimi</h1>
  <p class="desc">TV ekranında çıkan eşleştirme kodunu ve oynatılacak video linkini gir.</p>

  <label for="pin">Eşleştirme Kodu (PIN)</label>
  <input type="text" id="pin" placeholder="örn. 650040" maxlength="6">

  <label for="video">Video URL</label>
  <input type="text" id="video" placeholder="https://raw.githubusercontent.com/.../video.mp4">

  <button id="gonderBtn" onclick="videoAta()">Videoyu Ekrana Ata</button>

  <div id="sonuc"></div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxM0u9u4hNrhmOsniXvnrNfql_2PDYA8J58u9RLlSoz-en1q9nwH1eA8EQqcYUVbCHtsA/exec";

  function jsonpRequest(url) {
    return new Promise((resolve, reject) => {
      const callbackName = "jsonp_cb_" + Math.round(Math.random() * 1000000);
      const script = document.createElement("script");

      window[callbackName] = (data) => {
        resolve(data);
        delete window[callbackName];
        script.remove();
      };

      script.onerror = () => {
        reject(new Error("İstek başarısız"));
        delete window[callbackName];
        script.remove();
      };

      script.src = url + (url.includes("?") ? "&" : "?") + "callback=" + callbackName;
      document.body.appendChild(script);
    });
  }

  async function videoAta() {
    const pin = document.getElementById("pin").value.trim();
    const video = document.getElementById("video").value.trim();
    const btn = document.getElementById("gonderBtn");
    const sonucDiv = document.getElementById("sonuc");

    sonucDiv.className = "";
    sonucDiv.style.display = "none";

    if (!pin || !video) {
      sonucDiv.className = "hatali";
      sonucDiv.innerText = "Lütfen PIN ve video URL'sini gir.";
      return;
    }

    btn.disabled = true;
    btn.innerText = "Gönderiliyor...";

    try {
      const url = `${API_URL}?action=assign-video&pin=${encodeURIComponent(pin)}&video_url=${encodeURIComponent(video)}`;
      const data = await jsonpRequest(url);

      if (data.success) {
        sonucDiv.className = "basarili";
        sonucDiv.innerText = "✅ Video başarıyla atandı! Ekran en geç 30 saniye içinde oynatmaya başlayacak.";
      } else {
        sonucDiv.className = "hatali";
        sonucDiv.innerText = "❌ " + (data.error || "PIN bulunamadı, kontrol et.");
      }
    } catch (err) {
      sonucDiv.className = "hatali";
      sonucDiv.innerText = "❌ Bağlantı hatası: " + err.message;
    }

    btn.disabled = false;
    btn.innerText = "Videoyu Ekrana Ata";
  }
</script>

</body>
</html>
