<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspection TV</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }
  #video-alani {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-align: center;
  }
  #pin-kutusu {
    background: #111;
    padding: 50px 80px;
    border-radius: 20px;
    border: 2px solid #333;
  }
  #pin-kutusu h2 {
    font-size: 28px;
    font-weight: normal;
    color: #aaa;
    margin: 0 0 10px 0;
  }
  #pin-kutusu .pin {
    font-size: 90px;
    font-weight: bold;
    letter-spacing: 10px;
    color: #fff;
  }
  #my-video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }
</style>
</head>
<body>

<div id="video-alani">
  <div id="pin-kutusu">
    <h2>Eşleştirme Kodu</h2>
    <div class="pin" id="pin-text">...</div>
  </div>
</div>

<video id="my-video" style="display:none;" autoplay loop muted playsinline></video>

<script>
  // ===== AYAR: Apps Script Web App URL'in =====
  const API_URL = "https://script.google.com/macros/s/AKfycbzI6Bb9wElvCIyTdthG5mVd_IaTNvJKh2XtCFQDd9gwG6H_VGTT7K_svilFDpeKVEIkZw/exec";
  const CACHE_NAME = "tv-video-cache-v1";

  // JSONP yardımcı fonksiyonu (CORS sorunlarını aşmak için fetch yerine bunu kullanıyoruz)
  function jsonpRequest(url) {
    return new Promise((resolve, reject) => {
      const callbackName = "jsonp_cb_" + Math.round(Math.random() * 1000000);
      const script = document.createElement("script");

      window[callbackName] = (data) => {
        resolve(data);
        delete window[callbackName];
        script.remove();
      };

      script.onerror = () => {
        reject(new Error("JSONP isteği başarısız"));
        delete window[callbackName];
        script.remove();
      };

      script.src = url + (url.includes("?") ? "&" : "?") + "callback=" + callbackName;
      document.body.appendChild(script);
    });
  }

  // Videoyu yerel önbelleğe indirir (yoksa indirir, varsa atlar) ve oynatılabilir bir URL döner
  // Cache API desteklenmiyorsa (bazı eski Tizen tarayıcıları) direkt stream URL'ine geri döner
  async function getOfflineVideoUrl(videoUrl) {
    // Cache API tarayıcıda yoksa direkt orijinal URL'i kullan (offline çalışmaz ama en azından video oynar)
    if (!("caches" in window)) {
      console.warn("Bu tarayıcı Cache API desteklemiyor, video doğrudan stream edilecek.");
      return videoUrl;
    }

    try {
      const cache = await caches.open(CACHE_NAME);
      let response = await cache.match(videoUrl);

      if (!response) {
        console.log("Video önbellekte yok, indiriliyor:", videoUrl);
        const networkResponse = await fetch(videoUrl);
        if (!networkResponse.ok) throw new Error("İndirme başarısız: " + networkResponse.status);
        await cache.put(videoUrl, networkResponse.clone());
        response = networkResponse;
      } else {
        console.log("Video önbellekten okunuyor (offline çalışır).");
      }

      const blob = await response.blob();
      return URL.createObjectURL(blob);
    } catch (err) {
      console.error("Önbellekleme başarısız, direkt stream'e geçiliyor:", err);
      return videoUrl; // Cache API hata verirse direkt stream et
    }
  }

  let aktifVideoUrl = null; // şu an oynayan video'nun orijinal (sunucu) URL'i

  async function checkScreenStatus() {
    let deviceId = localStorage.getItem("device_id");
    let pinKodu = localStorage.getItem("pin_kodu");

    // Cihaz ilk kez açılıyorsa sunucudan PIN iste
    if (!deviceId) {
      try {
        let data = await jsonpRequest(`${API_URL}?action=get-pin`);
        localStorage.setItem("device_id", data.device_id);
        localStorage.setItem("pin_kodu", data.pin_kodu);
        document.getElementById("pin-text").innerText = data.pin_kodu;
      } catch (err) {
        document.getElementById("pin-text").innerText = "Bağlantı hatası";
      }
      return;
    }

    // Cihaz eşleşmişse video durumunu kontrol et
    try {
      let screenData = await jsonpRequest(`${API_URL}?action=check-status&id=${deviceId}`);

      if (screenData.has_video) {
        // Eğer video değişmediyse hiçbir şey yapma (zaten oynuyor)
        if (screenData.video_url === aktifVideoUrl) return;

        // Yeni bir video atandı: TV hafızasında yer kaplamasın diye eski videoları önbellekten temizle
        if ("caches" in window) {
          try {
            const cache = await caches.open(CACHE_NAME);
            const eskiKeyler = await cache.keys();
            for (const req of eskiKeyler) {
              if (req.url !== screenData.video_url) {
                await cache.delete(req);
                console.log("Eski video önbellekten silindi:", req.url);
              }
            }
          } catch (err) {
            console.warn("Eski önbellek temizlenemedi:", err);
          }
        }

        const blobUrl = await getOfflineVideoUrl(screenData.video_url);

        if (!blobUrl) {
          // İndirilemedi ve önbellekte de yoksa (ilk açılış + internet yok) bekle
          console.warn("Video henüz oynatılamıyor, internet bağlantısı bekleniyor.");
          return;
        }

        document.getElementById("video-alani").style.display = "none";
        let videoPlayer = document.getElementById("my-video");
        videoPlayer.style.display = "block";

        // Bazı Tizen TV tarayıcıları blob: URL'leri video kaynağı olarak kabul etmiyor.
        // Böyle bir durumda otomatik olarak direkt stream URL'ine geri dönüyoruz.
        videoPlayer.onerror = function () {
          console.error("Video kaynağı oynatılamadı, direkt stream URL'ine geçiliyor:", videoPlayer.src);
          if (videoPlayer.src !== screenData.video_url) {
            videoPlayer.onerror = null; // sonsuz döngüyü engelle
            videoPlayer.src = screenData.video_url;
            videoPlayer.play().catch((e) => console.error("Stream de oynatılamadı:", e));
          }
        };

        videoPlayer.src = blobUrl;
        aktifVideoUrl = screenData.video_url;

        videoPlayer.play().catch(() => {
          videoPlayer.muted = true;
          videoPlayer.play();
        });
      } else {
        // Henüz video atanmamışsa PIN'i göstermeye devam et
        document.getElementById("video-alani").style.display = "flex";
        document.getElementById("my-video").style.display = "none";
        document.getElementById("pin-text").innerText = pinKodu || "...";
      }
    } catch (err) {
      console.error("Durum kontrolü hatası (muhtemelen internet yok, önbellekteki video oynamaya devam eder):", err);
    }
  }

  checkScreenStatus();
  setInterval(checkScreenStatus, 30000);
</script>

</body>
</html>
